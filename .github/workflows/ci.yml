name: ci

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout umwelt sibling
        uses: actions/checkout@v4
        with:
          repository: AQuantumArchitect/umwelt
          path: umwelt

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          pip install -e ./umwelt
          pip install -e ".[dev]"
          pip install pytest

      - name: Pytest
        run: pytest tests/ -q

      - name: Proofs (core set)
        run: python proofs/run_all.py
        env:
          PYTHONPATH: src
